<!DOCTYPE html>

<head>

    <!-- إعدادات PWA (تطبيق الويب التقدمي) -->

    <style>
        body { font-family: 'Cairo', sans-serif; overscroll-behavior: none; }
        
        /* خلفية السجن المعتمة */
        .bg-prison {
            background-image: url('https://cdn.pixabay.com/photo/2017/08/02/18/20/prison-cell-2571164_1280.jpg');
            background-size: cover;
            background-position: center;
            filter: grayscale(100%) brightness(0.3);
        }
        
        /* مؤشر التحريك */
        .draggable {
            cursor: move;
            cursor: grab;
            user-select: none;
            position: absolute;
            z-index: 40;
            touch-action: none;
        }
        .draggable:active {
            cursor: grabbing;
        }
        .draggable:hover {
            outline: 2px dashed rgba(59, 130, 246, 0.5);
            z-index: 50;
        }
        .draggable-static {
            cursor: move;
            cursor: grab;
            user-select: none;
            position: relative;
            touch-action: none;
        }
        .draggable-static:hover {
            outline: 2px dashed rgba(59, 130, 246, 0.5);
        }
        
        /* إخفاء شريط التمرير للمدخلات */
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 4px; }

        /* مؤشر التحجيم */
        .resizable-handle {
            position: absolute;
            width: 24px;
            height: 24px;
            background-color: #3b82f6;
            border: 3px solid #fff;
            border-radius: 50%;

        .resizable-handle.bottom-right {
            bottom: -10px;
            right: -10px;

        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }

        @media print {
            .print\:hidden { display: none !important; }
            body { background: white; }
            .shadow-2xl { box-shadow: none !important; }
        }

</head>
<body class="bg-gray-100">

    <div id="root"></div>

    <!-- كود حقن PWA (Manifest + Service Worker) -->
    <script>
        // 1. إنشاء وحقن ملف Manifest ديناميكياً
        const pwaManifest = {
            "name": "SNHR Poster Generator",
            "short_name": "SNHR Poster",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#ffffff",
            "theme_color": "#1e3a8a",
            "orientation": "portrait",
            "scope": ".",
            "icons": [
                {
                    "src": "https://placehold.co/192x192/1e3a8a/ffffff?text=SNHR",
                    "sizes": "192x192",
                    "type": "image/png"
                },
                {
                    "src": "https://placehold.co/512x512/1e3a8a/ffffff?text=SNHR",
                    "sizes": "512x512",
                    "type": "image/png"
                }
            ]
        };

        const stringManifest = JSON.stringify(pwaManifest);
        const blobManifest = new Blob([stringManifest], {type: 'application/manifest+json'});
        const manifestURL = URL.createObjectURL(blobManifest);
        
        const manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        manifestLink.href = manifestURL;
        document.head.appendChild(manifestLink);

        // 2. تسجيل Service Worker (مطلوب لظهور زر التثبيت في كروم)
        if ('serviceWorker' in navigator) {
            // إنشاء Service Worker بسيط جداً للعمل دون اتصال
            const swCode = `
                self.addEventListener('install', (e) => {
                    self.skipWaiting();
                });
                self.addEventListener('activate', (e) => {
                    e.waitUntil(self.clients.claim());
                });
                self.addEventListener('fetch', (e) => {
                    // السماح بالاتصال بالشبكة بشكل طبيعي
                    e.respondWith(fetch(e.request).catch(() => {
                        return new Response("Offline mode not fully supported in this demo.");
                    }));
                });
            `;
            
            const swBlob = new Blob([swCode], {type: 'application/javascript'});
            const swUrl = URL.createObjectURL(swBlob);

            navigator.serviceWorker.register(swUrl)
                .then(() => console.log('Service Worker Registered for PWA'))
                .catch(err => console.log('SW Error:', err));
        }
    </script>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- أيقونات ---
        const Icons = {
            Camera: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>,
            Download: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>,
            Type: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" x2="15" y1="20" y2="20"/><line x1="12" x2="12" y1="4" y2="20"/></svg>,
            Palette: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>,
            Image: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>,
            Move: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" x2="22" y1="12" y2="12"/><line x1="12" x2="12" y1="2" y2="22"/></svg>,
            Install: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
        };

        const DraggableElement = ({ id, children, offsets, onStart, className, style, isResizable, onResizeStart, isAbsolute = false }) => {
            const offset = offsets[id] || { x: 0, y: 0 };
            return (
                <div 
                    onMouseDown={(e) => onStart(e, id, 'drag')}
                    onTouchStart={(e) => onStart(e, id, 'drag')}
                    className={`${isAbsolute ? 'draggable' : 'draggable-static'} ${className || ''}`}
                    style={{
                        ...style,
                        transform: `translate(${offset.x}px, ${offset.y}px)`,
                    }}
                >
                    {children}
                    {isResizable && (
                        <div 
                            className="resizable-handle bottom-right" 
                            onMouseDown={(e) => {
                                e.stopPropagation();
                                onStart(e, id, 'resize');
                            }}
                            onTouchStart={(e) => {
                                e.stopPropagation();
                                onStart(e, id, 'resize');
                            }}
                        ></div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [texts, setTexts] = useState({
                title: "مختطفون يواجهون حكم الإعدام",
                name: "أدخل نص",
                number: "00",
                unit: "#منسيون_خلف_القضبان",
                desc: "أدخل البيانات",
                footer: "عشرة أعوام من الإختطاف والجريمة مستمرة",
            });
            
            const [colors, setColors] = useState({
                titleText: "#1e3a8a",
                titleBg: "#eab308",
                nameText: "#1e3a8a",
                numberText: "#1e3a8a",
                unitBg: "#eab308",
                unitText: "#1e3a8a",
                descText: "#475569",
                footerBg: "#0ea5e9",
                footerText: "#ffffff",
                headerText: "#0ea5e9"
            });

            const [fonts, setFonts] = useState({
                header: 'Cairo',
                title: 'Cairo',
                name: 'Cairo',
                number: 'Cairo',
                unit: 'Cairo',
                desc: 'Cairo',
                footer: 'Cairo'
            });

            const [mainImage, setMainImage] = useState(null);
            const [posterBg, setPosterBg] = useState(null); 
            const [headerLogo, setHeaderLogo] = useState(null);
            const [headerLogoSize, setHeaderLogoSize] = useState(150);

            const [offsets, setOffsets] = useState({
                header: {x:0, y:0},
                title: {x:0, y:0},
                name: {x:0, y:0},
                number: {x:0, y:0},
                unit: {x:0, y:0},
                mainImage: {x:0, y:0},
                desc: {x:0, y:0},
                headerLogo: {x:0, y:0},
            });
            
            const [isDownloading, setIsDownloading] = useState(false);
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [activeTab, setActiveTab] = useState('data'); 
            const fileInputRef = useRef(null);
            const posterBgInputRef = useRef(null);
            const headerLogoInputRef = useRef(null);

            const [dragState, setDragState] = useState(null); 
            const [resizeState, setResizeState] = useState(null);

            // التعامل مع حدث التثبيت
            useEffect(() => {
                const handleBeforeInstallPrompt = (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                };
                window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
                return () => window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
            }, []);

            const handleInstallClick = async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    setDeferredPrompt(null);
                }
            };

            const getClientCoordinates = (e) => {
                if (e.touches && e.touches.length > 0) {
                    return { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY };
                }
                return { clientX: e.clientX, clientY: e.clientY };
            };

            const handleStart = (e, id, type) => {
                e.stopPropagation();
                const coords = getClientCoordinates(e);

                if (type === 'drag') {
                    setDragState({
                        id,
                        startX: coords.clientX,
                        startY: coords.clientY,
                        initialX: offsets[id]?.x || 0,
                        initialY: offsets[id]?.y || 0
                    });
                } else if (type === 'resize') {
                    setResizeState({
                        id,
                        startX: coords.clientX,
                        initialWidth: headerLogoSize
                    });
                }
            };

            useEffect(() => {
                const handleMove = (e) => {
                    if (!dragState && !resizeState) return;
                    if (e.cancelable && (dragState || resizeState)) {
                        e.preventDefault(); 
                    }

                    const coords = getClientCoordinates(e);

                    if (dragState) {
                        const dx = coords.clientX - dragState.startX;
                        const dy = coords.clientY - dragState.startY;
                        
                        setOffsets(prev => ({
                            ...prev,
                            [dragState.id]: {
                                x: dragState.initialX + dx,
                                y: dragState.initialY + dy
                            }
                        }));
                    } else if (resizeState) {
                        const dx = coords.clientX - resizeState.startX;
                        const newWidth = Math.max(40, resizeState.initialWidth + dx); 
                        setHeaderLogoSize(newWidth);
                    }
                };

                const handleEnd = () => {
                    setDragState(null);
                    setResizeState(null);
                };

                if (dragState || resizeState) {
                    window.addEventListener('mousemove', handleMove);
                    window.addEventListener('mouseup', handleEnd);
                    window.addEventListener('touchmove', handleMove, { passive: false }); 
                    window.addEventListener('touchend', handleEnd);
                }

                return () => {
                    window.removeEventListener('mousemove', handleMove);
                    window.removeEventListener('mouseup', handleEnd);
                    window.removeEventListener('touchmove', handleMove);
                    window.removeEventListener('touchend', handleEnd);
                };
            }, [dragState, resizeState, offsets]);


            const handleTextChange = (key, value) => setTexts(prev => ({ ...prev, [key]: value }));
            const handleColorChange = (key, value) => setColors(prev => ({ ...prev, [key]: value }));
            const handleFontChange = (key, value) => setFonts(prev => ({ ...prev, [key]: value }));
            
            const handleImageUpload = (e, setter) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setter(reader.result);
                    reader.readAsDataURL(file);
                }
            };
            
            const handleDownload = async () => {
                const canvasElement = document.getElementById('poster-canvas');
                if (!canvasElement) return;

                setIsDownloading(true);

                try {
                    const canvas = await html2canvas(canvasElement, {
                        scale: 3,
                        useCORS: true,
                        allowTaint: true,
                        backgroundColor: null,
                        logging: false
                    });

                    const image = canvas.toDataURL("image/png", 1.0);
                    const timestamp = new Date().getTime();
                    const filename = `HESHAM-${timestamp}.png`;

                    const link = document.createElement("a");
                    link.href = image;
                    link.download = filename;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                } catch (error) {
                    console.error("فشل التنزيل:", error);
                    alert("حدث خطأ أثناء حفظ الصورة.");
                } finally {
                    setIsDownloading(false);
                }
            };

            const fontOptions = [
                { name: 'Cairo', label: 'القاهرة (Cairo)' },
                { name: 'Tajawal', label: 'تجوّل (Tajawal)' },
                { name: 'Amiri', label: 'أميري (Amiri)' },
                { name: 'Lateef', label: 'لطيف (Lateef)' },
                { name: 'Almarai', label: 'المراعي (Almarai)' },
                { name: 'El Messiri', label: 'المسيري (El Messiri)' },
                { name: 'Lemonada', label: 'ليمونادة (Lemonada)' },
                { name: 'Reem Kufi', label: 'ريم كوفي (Reem Kufi)' },
                { name: 'Changa', label: 'تشانغا (Changa)' },
                { name: 'Mada', label: 'مدى (Mada)' },
                { name: 'Arial', label: 'Arial' },
            ];

            const FontSelector = ({ label, value, onChange }) => (
                <div>
                    <label className="text-xs text-gray-500 block mb-1">{label}</label>
                    <select value={value} onChange={onChange} className="w-full p-2 bg-gray-50 border rounded text-sm font-sans">
                        {fontOptions.map(f => <option key={f.name} value={f.name} style={{fontFamily: f.name}}>{f.label}</option>)}
                    </select>
                </div>
            );

            return (
                <div className="min-h-screen p-4 md:p-6 font-sans" dir="rtl">
                    <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
                        
                        {/* منطقة المعاينة */}
                        <div className="lg:col-span-8 flex flex-col items-center pt-2 lg:pt-4 order-1 lg:order-2">
                            <div className="w-full flex items-center justify-between mb-4 print:hidden px-2 md:px-0">
                                <h2 className="text-lg md:text-xl font-bold text-gray-800 flex items-center gap-2">
                                    <Icons.Camera className="w-5 h-5 text-blue-600" />
                                    معاينة التصميم
                                </h2>
                                <div className="flex gap-2">
                                    {deferredPrompt && (
                                        <button 
                                            onClick={handleInstallClick}
                                            className="bg-green-600 text-white px-3 py-2 rounded-lg hover:bg-green-700 transition flex items-center gap-2 shadow-sm text-sm font-bold"
                                        >
                                            <Icons.Install className="w-4 h-4" />
                                            تثبيت التطبيق
                                        </button>
                                    )}
                                    <button 
                                        onClick={handleDownload}
                                        disabled={isDownloading}
                                        className={`bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition flex items-center gap-2 shadow-sm text-sm font-bold ${isDownloading ? 'opacity-70 cursor-wait' : ''}`}
                                    >
                                        <Icons.Download className="w-4 h-4" />
                                        {isDownloading ? 'جاري الحفظ...' : 'حفظ PNG'}
                                    </button>
                                </div>
                            </div>
                            
                            {/* Canvas */}
                            <div 
                                id="poster-canvas"
                                className="relative w-full aspect-square bg-white shadow-2xl overflow-hidden flex flex-col text-center select-none"
                                style={{ 
                                    maxWidth: '650px', 
                                    fontFamily: fonts.header 
                                }}
                            >
                                {posterBg ? (
                                    <div className="absolute inset-0 z-0 pointer-events-none" style={{
                                        backgroundImage: `url(${posterBg})`,
                                        backgroundSize: 'cover',
                                        backgroundPosition: 'center',
                                        filter: 'grayscale(100%) brightness(0.4)'
                                    }}></div>
                                ) : (
                                    <div className="absolute inset-0 bg-prison opacity-80 z-0 pointer-events-none"></div>
                                )}
                                
                                {headerLogo && (
                                    <DraggableElement 
                                        id="headerLogo" 
                                        offsets={offsets} 
                                        onStart={handleStart}
                                        className="pointer-events-auto"
                                        isResizable={true}
                                        onResizeStart={handleStart}
                                        isAbsolute={true}
                                        style={{ 
                                            width: `${headerLogoSize}px`,
                                            top: '20px', 
                                            left: '50%',
                                            marginLeft: `-${headerLogoSize / 2}px`
                                        }}
                                    >
                                        <img src={headerLogo} alt="Header Logo" className="w-full h-auto drop-shadow-sm select-none" draggable="false" />
                                    </DraggableElement>
                                )}

                                <div className="h-24"></div>

                                <DraggableElement 
                                    id="title" 
                                    offsets={offsets} 
                                    onStart={handleStart}
                                    className="relative z-20 w-full flex justify-center mt-4 pointer-events-auto"
                                >
                                    <div 
                                        className="px-8 md:px-12 pt-1 pb-4 md:pt-2 md:pb-5 flex justify-center transform -skew-x-12 shadow-sm origin-center"
                                        style={{ backgroundColor: colors.titleBg }}
                                    >
                                        <h2 
                                            className="text-xl md:text-2xl lg:text-3xl font-black transform skew-x-12 whitespace-nowrap leading-none"
                                            style={{ color: colors.titleText, fontFamily: fonts.title }}
                                        >
                                            {texts.title}
                                        </h2>
                                    </div>
                                </DraggableElement>

                                <DraggableElement 
                                    id="name" 
                                    offsets={offsets} 
                                    onStart={handleStart}
                                    className="relative z-20 w-full mt-3 px-4 pointer-events-auto"
                                >
                                    <h3 
                                        className="text-2xl md:text-3xl lg:text-5xl font-extrabold leading-tight"
                                        style={{ color: colors.nameText, fontFamily: fonts.name }}
                                    >
                                        {texts.name}
                                    </h3>
                                </DraggableElement>

                                <div className="relative flex-1 w-full flex items-center justify-center -mt-6">
                                    <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[75%] aspect-square rounded-full z-0 opacity-20" style={{backgroundColor: colors.titleBg}}></div>

                                    <DraggableElement 
                                        id="number" 
                                        offsets={offsets} 
                                        onStart={handleStart}
                                        className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-10 w-full pointer-events-auto"
                                    >
                                        <span 
                                            className="font-black text-[140px] md:text-[180px] lg:text-[240px] opacity-90 leading-none drop-shadow-sm block translate-y-4"
                                            style={{ color: colors.numberText, fontFamily: fonts.number }}
                                        >
                                            {texts.number}
                                        </span>
                                    </DraggableElement>

                                    <DraggableElement 
                                        id="unit" 
                                        offsets={offsets} 
                                        onStart={handleStart}
                                        className="absolute left-6 bottom-1 z-30 transform -rotate-12 skew-x-6 pointer-events-auto"
                                    >
                                        <div className="px-2 md:px-4 pt-1 pb-4 flex justify-center shadow-md" style={{ backgroundColor: colors.unitBg }}>
                                            <span 
                                                className="text-lg md:text-xl font-black block transform skew-x-[-6deg] leading-none"
                                                style={{ color: colors.unitText, fontFamily: fonts.unit }}
                                            >
                                                {texts.unit}
                                            </span>
                                        </div>
                                    </DraggableElement>

                                    <DraggableElement 
                                        id="mainImage" 
                                        offsets={offsets} 
                                        onStart={handleStart}
                                        className="relative z-20 w-48 h-48 md:w-64 md:h-64 lg:w-72 lg:h-72 mt-8 md:mt-16 rounded-full border-[6px] border-white shadow-xl bg-gray-200 overflow-hidden flex-shrink-0 pointer-events-auto"
                                    >
                                        {mainImage ? (
                                            <img src={mainImage} alt="Person" className="w-full h-full object-cover scale-110" draggable="false" />
                                        ) : (
                                            <div className="w-full h-full flex flex-col items-center justify-center text-gray-400 bg-gray-100">
                                                <Icons.Image className="w-12 h-12 mb-2 opacity-50" />
                                                <span className="text-xs font-bold">مكان الصورة</span>
                                            </div>
                                        )}
                                    </DraggableElement>

                                    <DraggableElement 
                                        id="desc" 
                                        offsets={offsets} 
                                        onStart={handleStart}
                                        className="absolute right-[2%] top-[55%] transform -translate-y-1/2 w-[35%] md:w-[28%] text-right z-30 pointer-events-auto"
                                    >
                                        <p 
                                            className="text-[9px] md:text-xs font-bold leading-relaxed bg-white/80 p-2 md:p-3 rounded-lg shadow-sm backdrop-blur-sm border border-white/50"
                                            style={{ color: colors.descText, fontFamily: fonts.desc }}
                                        >
                                            {texts.desc}
                                        </p>
                                    </DraggableElement>
                                </div>

                                <div className="relative z-30 mt-auto w-full" style={{ backgroundColor: colors.footerBg }}>
                                    <div className="absolute -top-3 left-0 w-full h-4">
                                        <svg className="w-full h-full" preserveAspectRatio="none" viewBox="0 0 1200 120" style={{ fill: colors.footerBg }}>
                                            <path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V0H0V27.35A600.21,600.21,0,0,0,321.39,56.44Z"></path>
                                        </svg>
                                    </div>
                                    
                                    <div className="py-2 md:py-3 flex items-center justify-center">
                                        <span 
                                            className="text-xs md:text-sm font-light z-10 font-sans px-2"
                                            style={{ color: colors.footerText, fontFamily: fonts.footer }}
                                        >
                                            {texts.footer}
                                        </span>
                                    </div>
                                </div>
                            </div>
                            <div className="text-xs text-gray-400 mt-2 flex items-center gap-1 md:hidden">
                                <Icons.Move className="w-3 h-3" /> اسحب بإصبعك لتحريك العناصر
                            </div>
                        </div>

                        {/* الشريط الجانبي */}
                        <div className="lg:col-span-4 bg-white rounded-2xl shadow-lg border border-gray-200 h-auto lg:h-[calc(100vh-4rem)] flex flex-col lg:sticky lg:top-4 print:hidden overflow-hidden order-2 lg:order-1">
                            
                            <div className="flex border-b text-sm font-bold bg-gray-50">
                                <button onClick={() => setActiveTab('data')} className={`flex-1 py-4 flex items-center justify-center gap-2 ${activeTab === 'data' ? 'bg-white text-blue-600 border-t-2 border-blue-600' : 'text-gray-500 hover:bg-gray-100'}`}>
                                    <Icons.Type className="w-4 h-4" /> البيانات
                                </button>
                                <button onClick={() => setActiveTab('style')} className={`flex-1 py-4 flex items-center justify-center gap-2 ${activeTab === 'style' ? 'bg-white text-blue-600 border-t-2 border-blue-600' : 'text-gray-500 hover:bg-gray-100'}`}>
                                    <Icons.Palette className="w-4 h-4" /> التصميم
                                </button>
                                <button onClick={() => setActiveTab('images')} className={`flex-1 py-4 flex items-center justify-center gap-2 ${activeTab === 'images' ? 'bg-white text-blue-600 border-t-2 border-blue-600' : 'text-gray-500 hover:bg-gray-100'}`}>
                                    <Icons.Image className="w-4 h-4" /> الصور
                                </button>
                            </div>

                            <div className="flex-1 overflow-y-auto p-5 custom-scrollbar min-h-[300px]">
                                {activeTab === 'data' && (
                                    <div className="space-y-4">
                                        <div>
                                            <label className="text-xs font-bold text-gray-500 mb-1 block">العنوان الرئيسي</label>
                                            <input type="text" value={texts.title} onChange={(e) => handleTextChange('title', e.target.value)} className="w-full p-3 bg-gray-50 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-gray-500 mb-1 block">الاسم</label>
                                            <input type="text" value={texts.name} onChange={(e) => handleTextChange('name', e.target.value)} className="w-full p-3 bg-gray-50 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <div>
                                                <label className="text-xs font-bold text-gray-500 mb-1 block">الرقم</label>
                                                <input type="text" value={texts.number} onChange={(e) => handleTextChange('number', e.target.value)} className="w-full p-3 bg-gray-50 border rounded-lg text-center" />
                                            </div>
                                            <div>
                                                <label className="text-xs font-bold text-gray-500 mb-1 block">الوحدة</label>
                                                <input type="text" value={texts.unit} onChange={(e) => handleTextChange('unit', e.target.value)} className="w-full p-3 bg-gray-50 border rounded-lg text-center" />
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-gray-500 mb-1 block">الوصف</label>
                                            <textarea rows="3" value={texts.desc} onChange={(e) => handleTextChange('desc', e.target.value)} className="w-full p-3 bg-gray-50 border rounded-lg resize-none" />
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-gray-500 mb-1 block">تذييل الصفحة</label>
                                            <input type="text" value={texts.footer} onChange={(e) => handleTextChange('footer', e.target.value)} className="w-full p-3 bg-gray-50 border rounded-lg text-center" />
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'style' && (
                                    <div className="space-y-6">
                                        <div>
                                            <h3 className="text-sm font-bold text-gray-800 border-b pb-2 mb-3">تخصيص الخطوط</h3>
                                            <div className="space-y-3">
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                                    <FontSelector label="الترويسة (إن وجدت)" value={fonts.header} onChange={(e) => handleFontChange('header', e.target.value)} />
                                                    <FontSelector label="العنوان الرئيسي" value={fonts.title} onChange={(e) => handleFontChange('title', e.target.value)} />
                                                    <FontSelector label="الاسم" value={fonts.name} onChange={(e) => handleFontChange('name', e.target.value)} />
                                                    <FontSelector label="الرقم الكبير" value={fonts.number} onChange={(e) => handleFontChange('number', e.target.value)} />
                                                    <FontSelector label="الوحدة" value={fonts.unit} onChange={(e) => handleFontChange('unit', e.target.value)} />
                                                    <FontSelector label="الوصف" value={fonts.desc} onChange={(e) => handleFontChange('desc', e.target.value)} />
                                                    <FontSelector label="التذييل (Footer)" value={fonts.footer} onChange={(e) => handleFontChange('footer', e.target.value)} />
                                                </div>
                                            </div>
                                        </div>

                                        <div>
                                            <h3 className="text-sm font-bold text-gray-800 border-b pb-2 mb-3">ألوان النصوص</h3>
                                            <div className="grid grid-cols-2 gap-3">
                                                <div>
                                                    <label className="text-xs text-gray-500 block mb-1">نص العنوان</label>
                                                    <div className="flex items-center gap-2">
                                                        <input type="color" value={colors.titleText} onChange={(e) => handleColorChange('titleText', e.target.value)} className="w-10 h-10 rounded cursor-pointer border-0" />
                                                        <span className="text-xs text-gray-400">{colors.titleText}</span>
                                                    </div>
                                                </div>
                                                <div>
                                                    <label className="text-xs text-gray-500 block mb-1">خلفية العنوان</label>
                                                    <div className="flex items-center gap-2">
                                                        <input type="color" value={colors.titleBg} onChange={(e) => handleColorChange('titleBg', e.target.value)} className="w-10 h-10 rounded cursor-pointer border-0" />
                                                        <span className="text-xs text-gray-400">{colors.titleBg}</span>
                                                    </div>
                                                </div>
                                                <div>
                                                    <label className="text-xs text-gray-500 block mb-1">الاسم والرقم</label>
                                                    <div className="flex items-center gap-2">
                                                        <input type="color" value={colors.nameText} onChange={(e) => {
                                                            handleColorChange('nameText', e.target.value);
                                                            handleColorChange('numberText', e.target.value);
                                                        }} className="w-10 h-10 rounded cursor-pointer border-0" />
                                                        <span className="text-xs text-gray-400">تغيير</span>
                                                    </div>
                                                </div>
                                                <div>
                                                    <label className="text-xs text-gray-500 block mb-1">الخلفية (الفوتر)</label>
                                                    <div className="flex items-center gap-2">
                                                        <input type="color" value={colors.footerBg} onChange={(e) => handleColorChange('footerBg', e.target.value)} className="w-10 h-10 rounded cursor-pointer border-0" />
                                                        <span className="text-xs text-gray-400">{colors.footerBg}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'images' && (
                                    <div className="space-y-6">
                                        <div className="bg-blue-50 p-4 rounded-lg border border-blue-100">
                                            <label className="text-sm font-bold text-blue-800 mb-3 block">شعار الملصق (Header)</label>
                                            <div className="animate-fade-in">
                                                <div 
                                                    onClick={() => headerLogoInputRef.current.click()}
                                                    className="border-2 border-dashed border-blue-300 rounded-lg h-24 flex flex-col items-center justify-center cursor-pointer hover:bg-white transition bg-white/50"
                                                >
                                                    {headerLogo ? (
                                                        <img src={headerLogo} className="h-full object-contain p-2" />
                                                    ) : (
                                                        <div className="text-center text-blue-400 text-xs">
                                                            <Icons.Image className="w-6 h-6 mx-auto mb-1" />
                                                            رفع الشعار
                                                        </div>
                                                    )}
                                                    <input type="file" ref={headerLogoInputRef} onChange={(e) => handleImageUpload(e, setHeaderLogo)} accept="image/*" className="hidden" />
                                                </div>
                                                {headerLogo && (
                                                    <div className="mt-2 text-center">
                                                        <button 
                                                            onClick={() => setHeaderLogo(null)}
                                                            className="text-xs text-red-500 hover:underline"
                                                        >
                                                            حذف الشعار
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                        </div>

                                        <div>
                                            <label className="text-sm font-bold text-gray-700 mb-2 block flex justify-between">
                                                خلفية البوستر
                                                <span className="text-xs text-blue-500 font-normal cursor-pointer hover:underline" onClick={() => setPosterBg(null)}>استعادة الافتراضي</span>
                                            </label>
                                            <div 
                                                onClick={() => posterBgInputRef.current.click()}
                                                className="border-2 border-dashed border-gray-300 rounded-lg h-24 flex flex-col items-center justify-center cursor-pointer hover:bg-blue-50 transition"
                                            >
                                                {posterBg ? (
                                                    <img src={posterBg} className="h-full object-cover rounded-lg opacity-50" />
                                                ) : (
                                                    <div className="text-center text-gray-400 text-xs">
                                                        <Icons.Image className="w-6 h-6 mx-auto mb-1" />
                                                        تغيير الخلفية
                                                    </div>
                                                )}
                                                <input type="file" ref={posterBgInputRef} onChange={(e) => handleImageUpload(e, setPosterBg)} accept="image/*" className="hidden" />
                                            </div>
                                        </div>

                                        <div>
                                            <label className="text-sm font-bold text-gray-700 mb-2 block flex justify-between">
                                                الصورة الشخصية
                                                <span className="text-xs text-blue-500 font-normal cursor-pointer hover:underline" onClick={() => setMainImage(null)}>حذف</span>
                                            </label>
                                            <div 
                                                onClick={() => fileInputRef.current.click()}
                                                className="border-2 border-dashed border-gray-300 rounded-lg h-24 flex flex-col items-center justify-center cursor-pointer hover:bg-blue-50 transition"
                                            >
                                                {mainImage ? (
                                                    <img src={mainImage} className="h-full object-contain" />
                                                ) : (
                                                    <div className="text-center text-gray-400 text-xs">
                                                        <Icons.Image className="w-6 h-6 mx-auto mb-1" />
                                                        اضغط للرفع
                                                    </div>
                                                )}
                                                <input type="file" ref={fileInputRef} onChange={(e) => handleImageUpload(e, setMainImage)} accept="image/*" className="hidden" />
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
